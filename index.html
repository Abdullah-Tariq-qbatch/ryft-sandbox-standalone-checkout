<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryft · Secure Checkout</title>

  <!-- Ryft Embedded SDK v3 -->
  <script src="https://web-sdk.ryftpay.com/embedded/latest/ryft.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0e11;
      --surface:   #15171c;
      --border:    #252830;
      --muted:     #3a3e4a;
      --text:      #e8eaf0;
      --subtle:    #7b8096;
      --accent:    #5b7fff;
      --accent-dim:#2a3870;
      --success:   #34d399;
      --error:     #f87171;
      --radius:    14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(91,127,255,.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 90%, rgba(91,127,255,.06) 0%, transparent 70%);
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 1.5);
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      animation: slideUp .4s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .card-header {
      padding: 28px 32px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .lock-icon {
      width: 38px; height: 38px;
      background: var(--accent-dim);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .lock-icon svg { width: 18px; height: 18px; }

    .header-text h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -.3px;
    }

    .header-text p {
      font-size: 13px;
      color: var(--subtle);
      margin-top: 2px;
    }

    .version-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(91,127,255,.15);
      border: 1px solid rgba(91,127,255,.3);
      color: var(--accent);
      flex-shrink: 0;
    }

    /* ── Setup section ── */
    .setup-section {
      padding: 28px 32px;
      border-bottom: 1px solid var(--border);
    }

    .setup-section h2 {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 16px;
    }

    .field-group { display: flex; flex-direction: column; gap: 12px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--subtle);
      font-family: 'DM Mono', monospace;
    }

    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      width: 100%;
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }

    .apply-btn {
      margin-top: 16px;
      width: 100%;
      padding: 11px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }

    .apply-btn:hover  { background: rgba(91,127,255,.25); }
    .apply-btn:active { transform: scale(.98); }

    /* ── Payment area ── */
    .payment-section { padding: 28px 32px; }

    .payment-section h2 {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--subtle);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    #init-notice {
      padding: 14px 16px;
      background: rgba(91,127,255,.08);
      border: 1px solid rgba(91,127,255,.2);
      border-radius: 8px;
      font-size: 12.5px;
      color: var(--subtle);
      text-align: center;
      margin-bottom: 12px;
    }

    #card-form-container {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      min-height: 56px;
    }

    /* Pay button */
    #pay-btn {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -.2px;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 4px 20px rgba(91,127,255,.35);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    #pay-btn:hover:not(:disabled) { opacity: .9; box-shadow: 0 6px 28px rgba(91,127,255,.45); }
    #pay-btn:active:not(:disabled) { transform: scale(.98); }
    #pay-btn:disabled { opacity: .5; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #ryft-pay-error {
      margin-top: 14px;
      font-size: 13.5px;
      min-height: 20px;
      text-align: center;
    }

    .msg-success { color: var(--success); }
    .msg-error   { color: var(--error); }

    /* ── Status pill ── */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--border);
      color: var(--subtle);
    }

    .status-pill.ready { background: rgba(52,211,153,.12); color: var(--success); }
    .status-pill.error { background: rgba(248,113,113,.12); color: var(--error); }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── Footer ── */
    .card-footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .card-footer svg { opacity: .4; }
    .card-footer span { font-size: 11.5px; color: var(--subtle); }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="card-header">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5b7fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Secure Checkout</h1>
      <p>Powered by Ryft · TLS encrypted</p>
    </div>
    <span class="version-badge">SDK v3</span>
  </div>

  <!-- SDK Config -->
  <div class="setup-section">
    <h2>SDK Configuration</h2>
    <div class="field-group">
      <div class="field">
        <label>Client Secret</label>
        <input type="text" id="client-secret" placeholder="ps_01ABC…_secret_…" autocomplete="off" />
      </div>
      <div class="field">
        <label>Public Key</label>
        <input type="text" id="public-key" placeholder="pk_sandbox_…" autocomplete="off" />
      </div>
      <div class="field">
        <label>Account ID <span style="opacity:.5">(optional — sub-account / platform fee)</span></label>
        <input type="text" id="account-id" placeholder="ac_…" autocomplete="off" />
      </div>
    </div>
    <button class="apply-btn" onclick="initRyft()">Apply &amp; Load Payment Form</button>
  </div>

  <!-- Payment -->
  <div class="payment-section">
    <div class="status-row">
      <h2>Card Details</h2>
      <span class="status-pill" id="status-pill">
        <span class="status-dot"></span>
        Not initialised
      </span>
    </div>

    <div id="init-notice">Fill in the SDK Configuration above and click <strong>Apply</strong> to load the payment form.</div>

    <div id="card-form-container" style="display:none"></div>

    <button id="pay-btn" disabled>
      <span class="spinner" id="spinner"></span>
      <span id="pay-label">Pay Now</span>
    </button>

    <div id="ryft-pay-error"></div>
  </div>

  <!-- Footer -->
  <div class="card-footer">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7b8096" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <span>256-bit TLS · PCI DSS compliant · Ryft Payments</span>
  </div>

</div>

<script type="module">
  const { createController, createCardForm } = window.Ryft;

  let cardForm = null;

  const payButton     = document.getElementById('pay-btn');
  const spinner       = document.getElementById('spinner');
  const payLabel      = document.getElementById('pay-label');
  const errorDiv      = document.getElementById('ryft-pay-error');
  const statusPill    = document.getElementById('status-pill');
  const initNotice    = document.getElementById('init-notice');
  const cardContainer = document.getElementById('card-form-container');

  function setStatus(state, text) {
    statusPill.className = 'status-pill ' + state;
    statusPill.innerHTML = `<span class="status-dot"></span>${text}`;
  }

  function showError(msg) {
    errorDiv.innerHTML = `<p class="msg-error">${msg}</p>`;
  }

  function showSuccess(msg) {
    errorDiv.innerHTML = `<p class="msg-success">${msg}</p>`;
  }

  function setPayLoading(loading) {
    payButton.disabled       = loading;
    spinner.style.display    = loading ? 'block' : 'none';
    payLabel.textContent     = loading ? 'Processing…' : 'Pay Now';
  }

  // Exposed globally so the inline onclick can call it
  window.initRyft = function () {
    errorDiv.innerHTML = '';

    const clientSecret = document.getElementById('client-secret').value.trim();
    const publicKey    = document.getElementById('public-key').value.trim();
    const accountId    = document.getElementById('account-id').value.trim();

    if (!clientSecret || !publicKey) {
      showError('Please enter both a Client Secret and a Public Key.');
      return;
    }

    // Unmount any existing card form
    if (cardForm) {
      try { cardForm.unmount(); } catch(e) {}
      cardForm = null;
    }

    cardContainer.innerHTML  = '';
    cardContainer.style.display = 'block';
    initNotice.style.display = 'none';
    payButton.disabled       = true;
    setStatus('', 'Initialising…');

    try {
      const controllerConfig = { publicKey, clientSecret };
      if (accountId) controllerConfig.accountId = accountId;

      const controller = createController(controllerConfig);

      cardForm = createCardForm(controller, {
        customerPaymentMethods: {
          allowStorage: {
            enabled: true
          }
        }
      });

      // Enable Pay button only when card inputs are valid
      cardForm.on('validationChange', (event) => {
        payButton.disabled = !event.isValid;
      });

      cardForm.mount('#card-form-container');
      setStatus('ready', 'Ready');

    } catch (err) {
      setStatus('error', 'Init failed');
      showError('Ryft init error: ' + (err.message || err));
      console.error(err);
    }
  };

  payButton.addEventListener('click', async (e) => {
    e.preventDefault();
    if (!cardForm) { showError('Please initialise the SDK first.'); return; }

    errorDiv.innerHTML = '';
    setPayLoading(true);

    try {
      const result = await cardForm.attemptPayment();
      handleResult(result);
    } catch (err) {
      console.error('Payment error', err);
      showError(err.message || 'An unexpected error occurred. Please try again.');
    } finally {
      setPayLoading(false);
    }
  });

  function handleResult(result) {
    const session = result.paymentSession;

    if (session.status === 'Approved' || session.status === 'Captured') {
      showSuccess('✓ Payment successful! Status: ' + session.status);
      payButton.disabled = true;
      setStatus('ready', 'Payment complete');
      console.log('Payment successful', session);
      return;
    }

    if (session.lastError) {
      payButton.disabled = false;
      const msg = result.userFacingErrorMessage || session.lastError.message || JSON.stringify(session.lastError);
      showError(msg);
      console.error('Payment error', session.lastError);
    }
  }

  // Pre-fill from URL query params: ?clientSecret=...&publicKey=...&accountId=...
  (function prefillFromURL() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('clientSecret')) document.getElementById('client-secret').value = params.get('clientSecret');
    if (params.get('publicKey'))    document.getElementById('public-key').value    = params.get('publicKey');
    if (params.get('accountId'))    document.getElementById('account-id').value    = params.get('accountId');
    if (params.get('clientSecret') && params.get('publicKey')) window.initRyft();
  })();
</script>

</body>
</html>
